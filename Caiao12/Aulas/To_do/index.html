<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarefas</title>
    <script src="script.js"></script>
    <style>
        body{
            font-family: Georgia, 'Times New Roman', Times, serif;
            color: rgb(0, 0, 0);
            background-color: rgb(206, 236, 243);
            padding: 40px;   
        }
        h1{
            color: black;
            text-align: center;
        }
        .input-area{
            text-align: left;
            margin-bottom: 25px;
        }
        #tarefaInput{
            padding: 12px;
            border-radius: 8px;
            border: black, solid 1px;
        }
        #btnAdicionar:hover{
           
            color: rgb(0, 0, 0);
            background-color: #a7d5f3;
           
            cursor: pointer;
            border-radius: 8px;
            transform: 0.5s;
        }
        #listaTarefas{
            padding: 0px;

        }
        li{
            background-color: rgb(196, 228, 255);
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 8px;
            border: cadetblue dotted 2px;
            display: flex;
            justify-content: space-between;

        }
    </style>
</head>

<body>
    
    <h1>Tarefas</h1>
    <div>
        <input id="tarefaInput" type="text" placeholder="Digite sua Tarefa!"/>
        <button id="btnAdicionar">+</button>
    </div>
    <ul id="listaTarefas">
        <li>Estudar</li>
    </ul>


</body>
</html>
